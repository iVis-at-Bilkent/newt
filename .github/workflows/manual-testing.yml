name: Chrome Headless Manual

on: 
  workflow_dispatch:
  push:
    branches:
      - workflow-testing

jobs:
  chrome-headless:
    runs-on: ubuntu-latest
    container: cypress/browsers:node14.19.0-chrome100-ff99-edge
    environment: test0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Headless Chrome
        uses: cypress-io/github-action@v6
        timeout-minutes: 15
        with:
          build: npm run release-build
          start: node server.js
          browser: chrome
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.dashboardRecordKey }} 